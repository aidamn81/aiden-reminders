<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gothic Archive: Drag & Edit</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-color: #1a1a1a;
            --accent-color: #4a0404;
            --text-color: #d1d1d1;
            --border-color: #333;
            --highlight: #8b0000;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Georgia', serif;
            margin: 0;
            overflow-x: hidden;
        }

        .admin-bar {
            background: var(--panel-color);
            padding: 15px;
            border-bottom: 2px solid var(--accent-color);
            display: flex;
            gap: 10px;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
        }

        .admin-bar button {
            background: #222;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        button.active {
            background: var(--accent-color);
            border-color: var(--highlight);
        }

        #widget-display-area {
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .widget-box {
            background: var(--panel-color);
            border: 1px solid var(--accent-color);
            width: 300px;
            min-height: 100px;
            padding: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .widget-title {
            font-size: 1.1rem;
            color: var(--highlight);
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 10px;
            padding: 5px;
        }

        .reminder-list {
            min-height: 50px;
        }

        .reminder-item {
            background: #000;
            border-left: 2px solid var(--accent-color);
            margin-bottom: 8px;
            padding: 8px;
            font-size: 0.85rem;
            cursor: grab;
            position: relative;
        }

        .reminder-item.dragging { opacity: 0.5; }

        .reminder-item span { cursor: pointer; display: inline-block; width: 80%; }
        .reminder-item span:hover { color: var(--highlight); }

        .reminder-time { font-size: 0.7rem; color: #666; display: block; }
        
        .reminder-item img {
            width: 100%;
            margin-top: 5px;
            border: 1px solid var(--border-color);
        }

        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: var(--panel-color);
            padding: 20px;
            border: 2px solid var(--accent-color);
            width: 90%;
            max-width: 400px;
        }

        input, select { 
            width: 100%; 
            background: #000; 
            border: 1px solid var(--border-color); 
            color: white; 
            margin: 8px 0; 
            padding: 10px; 
            box-sizing: border-box;
        }

        input[type="checkbox"] { width: auto; margin-right: 8px; }

        .edit-mode .reminder-item { outline: 1px dashed #444; }
    </style>
</head>
<body>

<div class="admin-bar">
    <button id="edit-toggle" onclick="toggleEditMode()">Edit Mode</button>
    <button onclick="openModal()">+ Add</button>
    <button onclick="requestNotify()">Notifs</button>
</div>

<div id="widget-display-area"></div>

<div id="modal-overlay">
    <div class="modal">
        <h3 id="modal-title" style="color:var(--highlight); text-align:center;">ARCHIVE ENTRY</h3>
        <input type="hidden" id="edit-id">
        <input type="text" id="rem-text" placeholder="Task Name">
        <input type="datetime-local" id="rem-time">
        <select id="widget-select" onchange="toggleWidgetInput()">
            <option value="new">-- New Widget --</option>
        </select>
        <input type="text" id="new-widget-name" placeholder="Widget Name...">
        <input type="text" id="rem-link" placeholder="Link (Optional)">
        <input type="file" id="rem-file" accept="image/*">
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button style="flex:1; background:var(--accent-color); color:white; border:none; padding:12px;" onclick="saveReminder()">SAVE</button>
            <button style="flex:1; background:#222; color:white; border:none; padding:12px;" onclick="closeModal()">CANCEL</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDHrIBHOkeixoLagY9f2JfFqWpQRFj8MeE",
        authDomain: "aiden-reminders.firebaseapp.com",
        databaseURL: "https://aiden-reminders-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "aiden-reminders",
        storageBucket: "aiden-reminders.firebasestorage.app",
        messagingSenderId: "87284883715",
        appId: "1:87284883715:web:c2de76ab3d2f1170084936"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'reminders');

    let reminders = [];
    let isEditMode = false;

    // --- INTERFACE ---
    window.toggleEditMode = () => {
        isEditMode = !isEditMode;
        document.body.classList.toggle('edit-mode', isEditMode);
        document.getElementById('edit-toggle').classList.toggle('active', isEditMode);
    };

    window.openModal = (id = null) => {
        const select = document.getElementById('widget-select');
        select.innerHTML = '<option value="new">-- New Widget --</option>';
        const unique = [...new Set(reminders.map(r => r.widget))].filter(Boolean);
        unique.forEach(n => select.innerHTML += `<option value="${n}">${n}</option>`);

        if (id) {
            const rem = reminders.find(r => r.id === id);
            document.getElementById('edit-id').value = id;
            document.getElementById('rem-text').value = rem.text;
            document.getElementById('rem-time').value = rem.time || '';
            document.getElementById('rem-link').value = rem.link || '';
            document.getElementById('widget-select').value = rem.widget;
            document.getElementById('modal-title').innerText = "EDIT ENTRY";
        } else {
            document.getElementById('edit-id').value = '';
            document.getElementById('rem-text').value = '';
            document.getElementById('rem-time').value = '';
            document.getElementById('rem-link').value = '';
            document.getElementById('modal-title').innerText = "NEW ENTRY";
        }
        document.getElementById('modal-overlay').style.display = 'flex';
        window.toggleWidgetInput();
    };

    window.closeModal = () => document.getElementById('modal-overlay').style.display = 'none';

    window.toggleWidgetInput = () => {
        document.getElementById('new-widget-name').style.display = (document.getElementById('widget-select').value === 'new') ? 'block' : 'none';
    };

    // --- DATA ---
    onValue(dbRef, (snapshot) => {
        const data = snapshot.val();
        reminders = data ? Object.keys(data).map(key => ({ ...data[key], id: key })) : [];
        renderArchive();
    });

    window.saveReminder = () => {
        const id = document.getElementById('edit-id').value;
        const text = document.getElementById('rem-text').value;
        const time = document.getElementById('rem-time').value;
        const link = document.getElementById('rem-link').value;
        const widget = (document.getElementById('widget-select').value === 'new') ? document.getElementById('new-widget-name').value : document.getElementById('widget-select').value;
        const file = document.getElementById('rem-file').files[0];

        const finalize = (img = null) => {
            const data = { text, time, link, widget };
            if (img) data.image = img;

            if (id) update(ref(db, `reminders/${id}`), data);
            else push(dbRef, data);
            closeModal();
        };

        if (file) {
            const r = new FileReader();
            r.onload = (e) => finalize(e.target.result);
            r.readAsDataURL(file);
        } else finalize();
    };

    window.deleteReminder = (id) => {
        if(confirm("Delete?")) remove(ref(db, `reminders/${id}`));
    };

    // --- DRAG AND DROP ---
    function initDragAndDrop() {
        const items = document.querySelectorAll('.reminder-item');
        const lists = document.querySelectorAll('.reminder-list');

        items.forEach(item => {
            item.addEventListener('dragstart', () => item.classList.add('dragging'));
            item.addEventListener('dragend', () => item.classList.remove('dragging'));
        });

        lists.forEach(list => {
            list.addEventListener('dragover', e => {
                e.preventDefault();
                const dragging = document.querySelector('.dragging');
                list.appendChild(dragging);
            });

            list.addEventListener('drop', e => {
                const dragging = document.querySelector('.dragging');
                const newWidget = list.parentElement.getAttribute('data-name');
                const id = dragging.getAttribute('data-id');
                update(ref(db, `reminders/${id}`), { widget: newWidget });
            });
        });
    }

    function renderArchive() {
        const container = document.getElementById('widget-display-area');
        container.innerHTML = '';
        const groups = reminders.reduce((acc, curr) => {
            if (!acc[curr.widget]) acc[curr.widget] = [];
            acc[curr.widget].push(curr);
            return acc;
        }, {});

        Object.keys(groups).forEach(name => {
            const box = document.createElement('div');
            box.className = 'widget-box';
            box.setAttribute('data-name', name);
            box.innerHTML = `<div class="widget-title">${name}</div><div class="reminder-list"></div>`;
            
            groups[name].forEach(item => {
                const div = document.createElement('div');
                div.className = 'reminder-item';
                div.draggable = true;
                div.setAttribute('data-id', item.id);
                div.innerHTML = `
                    <input type="checkbox" onchange="deleteReminder('${item.id}')">
                    <span onclick="isEditMode ? openModal('${item.id}') : null">${item.text}</span>
                    <small class="reminder-time">${item.time || ''}</small>
                    ${item.image ? `<img src="${item.image}">` : ''}`;
                box.querySelector('.reminder-list').appendChild(div);
            });
            container.appendChild(box);
        });
        initDragAndDrop();
    }

    window.requestNotify = () => {
        Notification.requestPermission();
    };
</script>
</body>
</html>
