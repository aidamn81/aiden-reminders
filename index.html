<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gothic Archive: Reminders</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-color: #1a1a1a;
            --accent-color: #4a0404;
            --text-color: #d1d1d1;
            --border-color: #333;
            --highlight: #8b0000;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Georgia', serif;
            margin: 0;
            overflow-x: hidden;
            touch-action: pan-y;
        }

        /* Admin Bar: Centered and Bigger Buttons */
        .admin-bar {
            background: var(--panel-color);
            padding: 20px;
            border-bottom: 2px solid var(--accent-color);
            display: flex;
            gap: 20px;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .admin-bar button {
            background: #222;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button.active {
            background: var(--accent-color);
            border-color: var(--highlight);
            box-shadow: 0 0 15px var(--highlight);
        }

        /* Widget Container (Folders) */
        #widget-display-area {
            padding: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
        }

        .widget-box {
            background: var(--panel-color);
            border: 1px solid var(--accent-color);
            width: 320px;
            min-height: 200px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: relative;
        }

        .widget-title {
            font-size: 1.4rem;
            color: var(--highlight);
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 15px;
            padding-bottom: 5px;
            text-transform: capitalize;
        }

        /* Individual Reminder Items */
        .reminder-item {
            background: #000;
            border-left: 3px solid var(--accent-color);
            margin-bottom: 10px;
            padding: 10px;
            font-size: 0.9rem;
        }

        .reminder-item span { display: block; margin-bottom: 5px; }
        .reminder-time { color: #888; font-size: 0.8rem; font-style: italic; }
        
        .reminder-item img {
            max-width: 100%;
            height: auto;
            margin-top: 8px;
            border: 1px solid var(--border-color);
        }

        /* Modal */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            overflow-y: auto;
        }

        .modal {
            background: var(--panel-color);
            padding: 25px;
            border: 2px solid var(--accent-color);
            width: 90%;
            max-width: 450px;
            margin: 20px;
        }

        label { display: block; margin-top: 10px; font-size: 0.8rem; color: #888; }
        input, select { 
            width: 100%; 
            background: #000; 
            border: 1px solid var(--border-color); 
            color: white; 
            margin: 5px 0 15px 0; 
            padding: 10px; 
            box-sizing: border-box;
        }

        @media (max-width: 768px) {
            .admin-bar { flex-direction: column; align-items: center; gap: 10px; }
            .widget-box { width: 100%; }
        }
    </style>
</head>
<body>

<div class="admin-bar">
    <button id="edit-toggle" onclick="toggleEditMode()">Enable Edit Mode</button>
    <button onclick="openModal()">+ Add Reminder</button>
</div>

<div id="widget-display-area">
    </div>

<div id="modal-overlay">
    <div class="modal">
        <h3 style="color:var(--highlight); margin-top:0;">New Archive Entry</h3>
        
        <label>Reminder Text</label>
        <input type="text" id="rem-text" placeholder="The task at hand...">
        
        <label>Remind Me At (Date & Time)</label>
        <input type="datetime-local" id="rem-time">

        <label>Assign to Widget</label>
        <select id="widget-select" onchange="toggleNewWidgetInput()">
            <option value="new">+ Create New Widget</option>
        </select>
        <input type="text" id="new-widget-name" placeholder="Name of new widget..." style="display:block;">

        <label>Link (Optional)</label>
        <input type="text" id="rem-link" placeholder="https://...">

        <label>Visual Aid (Optional)</label>
        <input type="file" id="rem-file" accept="image/*">

        <div style="display:flex; gap:10px; margin-top:10px;">
            <button style="flex:1; background:var(--accent-color); color:white; border:none; padding:12px;" onclick="addReminder()">Bind to Archive</button>
            <button style="flex:1; background:#333; color:white; border:none; padding:12px;" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDHrIBHOkeixoLagY9f2JfFqWpQRFj8MeE",
        authDomain: "aiden-reminders.firebaseapp.com",
        databaseURL: "https://aiden-reminders-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "aiden-reminders",
        storageBucket: "aiden-reminders.firebasestorage.app",
        messagingSenderId: "87284883715",
        appId: "1:87284883715:web:c2de76ab3d2f1170084936"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let editMode = false;
    let reminders = [];

    // --- LOGIC ---

    window.toggleEditMode = () => {
        editMode = !editMode;
        document.body.classList.toggle('edit-mode', editMode);
        document.getElementById('edit-toggle').classList.toggle('active', editMode);
        document.getElementById('edit-toggle').innerText = editMode ? "Lock Archive" : "Enable Edit Mode";
    };

    window.openModal = () => {
        updateWidgetDropdown();
        document.getElementById('modal-overlay').style.display = 'flex';
    };

    window.closeModal = () => {
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('rem-text').value = '';
        document.getElementById('rem-time').value = '';
        document.getElementById('rem-link').value = '';
        document.getElementById('rem-file').value = '';
        document.getElementById('new-widget-name').value = '';
    };

    window.toggleNewWidgetInput = () => {
        const select = document.getElementById('widget-select');
        const input = document.getElementById('new-widget-name');
        input.style.display = (select.value === 'new') ? 'block' : 'none';
    };

    function updateWidgetDropdown() {
        const select = document.getElementById('widget-select');
        // Clear existing options except the "New" one
        select.innerHTML = '<option value="new">+ Create New Widget</option>';
        
        const uniqueWidgets = [...new Set(reminders.map(r => r.widget))];
        uniqueWidgets.forEach(w => {
            if(w) {
                const opt = document.createElement('option');
                opt.value = w;
                opt.textContent = w;
                select.appendChild(opt);
            }
        });
    }

    // SYNC DATA
    onValue(ref(db, 'reminders'), (snapshot) => {
        const data = snapshot.val();
        reminders = data ? Object.keys(data).map(key => ({ ...data[key], id: key })) : [];
        renderWidgets();
    });

    window.addReminder = () => {
        const text = document.getElementById('rem-text').value;
        const time = document.getElementById('rem-time').value;
        const link = document.getElementById('rem-link').value;
        const selectVal = document.getElementById('widget-select').value;
        const newWName = document.getElementById('new-widget-name').value;
        const file = document.getElementById('rem-file').files[0];

        const widgetName = selectVal === 'new' ? newWName : selectVal;

        if (!text || !widgetName) return alert("Task and Widget Name required");

        const upload = (imgBase64 = null) => {
            push(ref(db, 'reminders'), { 
                text, 
                time, 
                link, 
                widget: widgetName, 
                image: imgBase64 
            });
            closeModal();
        };

        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => upload(e.target.result);
            reader.readAsDataURL(file);
        } else {
            upload();
        }
    };

    window.deleteReminder = (id) => {
        if (confirm("Erase this ritual from the archive?")) {
            remove(ref(db, `reminders/${id}`));
        }
    };

    function renderWidgets() {
        const area = document.getElementById('widget-display-area');
        area.innerHTML = '';

        // Group reminders by widget
        const groups = reminders.reduce((acc, rem) => {
            if (!acc[rem.widget]) acc[rem.widget] = [];
            acc[rem.widget].push(rem);
            return acc;
        }, {});

        Object.keys(groups).forEach(widgetName => {
            const box = document.createElement('div');
            box.className = 'widget-box';
            
            let itemsHtml = groups[widgetName].map(rem => `
                <div class="reminder-item">
                    <input type="checkbox" onchange="deleteReminder('${rem.id}')">
                    <span>${rem.text}</span>
                    <div class="reminder-time">${rem.time ? rem.time.replace('T', ' ') : 'No time set'}</div>
                    ${rem.link ? `<a href="${rem.link}" target="_blank" style="color:var(--highlight); font-size:0.8rem;">Open Link</a>` : ''}
                    ${rem.image ? `<img src="${rem.image}">` : ''}
                </div>
            `).join('');

            box.innerHTML = `
                <div class="widget-title">${widgetName}</div>
                <div class="reminder-list">${itemsHtml}</div>
            `;
            area.appendChild(box);
        });
    }
</script>
</body>
</html>
