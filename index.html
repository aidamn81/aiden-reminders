<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Archive">
    <link rel="apple-touch-icon" href="https://your-hosted-path.com/gothic-brain-icon.png">
    
    <title>Gothic Archive: Full Edit Protocol</title>
    <style>
        :root {
            --bg-color: #050505;
            --panel-color: rgba(26, 26, 26, 0.95);
            --accent-color: #4a0404;
            --text-color: #e0e0e0;
            --border-color: #333;
            --highlight: #8b0000;
            --gloss: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 50%);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Georgia', serif;
            margin: 0;
            padding-bottom: 60px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .admin-bar {
            background: var(--panel-color);
            backdrop-filter: blur(15px);
            padding: 15px;
            border-bottom: 1px solid var(--accent-color);
            display: flex;
            gap: 10px;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
        }

        .admin-bar button {
            background: #111;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        .admin-bar button.active {
            background: var(--accent-color);
            border-color: var(--highlight);
            box-shadow: 0 0 15px var(--highlight);
        }

        #widget-display-area {
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .widget-box {
            background: var(--panel-color);
            border: 1px solid rgba(74, 4, 4, 0.4);
            width: 320px;
            min-height: 120px;
            padding: 15px;
            border-radius: 25px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        .widget-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 50%;
            background: var(--gloss);
            pointer-events: none;
            border-radius: 25px 25px 0 0;
        }

        .widget-title {
            font-size: 1.1rem;
            color: var(--highlight);
            text-align: center;
            margin-bottom: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 5px;
        }

        .reminder-list { min-height: 50px; }

        .reminder-item {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 12px;
            margin-bottom: 8px;
            padding: 8px 12px;
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            gap: 5px;
            border: 1px solid rgba(255,255,255,0.03);
            position: relative;
        }

        .reminder-item.dragging { opacity: 0.2; transform: scale(0.95); }

        .reminder-header { display: flex; align-items: center; gap: 10px; width: 100%; }
        
        /* Highlighting the clickable area in Edit Mode */
        .edit-mode .reminder-header span { 
            color: var(--highlight); 
            text-decoration: underline; 
            cursor: pointer;
            font-weight: bold;
        }

        .reminder-header span { flex-grow: 1; }
        
        .reminder-item img {
            width: 100%;
            border-radius: 8px;
            margin-top: 5px;
            border: 1px solid var(--border-color);
        }

        .reminder-time-label { font-size: 0.7rem; color: #777; font-style: italic; }

        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: #111;
            padding: 25px;
            border: 1px solid var(--accent-color);
            border-radius: 30px;
            width: 85%;
            max-width: 400px;
        }

        input, select { 
            width: 100%; background: #000; border: 1px solid #333; 
            color: white; margin: 8px 0; padding: 12px; border-radius: 10px; 
            font-family: inherit;
        }

        .edit-mode .reminder-item { cursor: default; } /* No grab cursor in edit mode to allow clicks */
    </style>
</head>
<body class="">

<div class="admin-bar">
    <button id="edit-toggle" onclick="toggleEditMode()">Edit Mode</button>
    <button onclick="openModal()">+ Add</button>
    <button onclick="requestNotify()">Enable Notifications</button>
    <button onclick="location.reload()">Refresh App</button>
</div>

<div id="widget-display-area"></div>

<div id="modal-overlay">
    <div class="modal">
        <h3 id="modal-title" style="color:var(--highlight); text-align:center; margin-top:0;">ARCHIVE ENTRY</h3>
        <input type="hidden" id="edit-id">
        <input type="text" id="rem-text" placeholder="Ritual/Task Name">
        <input type="datetime-local" id="rem-time">
        <select id="widget-select" onchange="toggleWidgetInput()">
            <option value="new">-- Create New Widget --</option>
        </select>
        <input type="text" id="new-widget-name" placeholder="Widget Name..." style="display:none;">
        <input type="text" id="rem-link" placeholder="Link (Optional)">
        <input type="file" id="rem-file" accept="image/*">
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button style="flex:1; background:var(--accent-color); color:white; border:none; padding:12px; border-radius:15px;" onclick="saveReminder()">BIND DATA</button>
            <button style="flex:1; background:#222; color:white; border:none; padding:12px; border-radius:15px;" onclick="closeModal()">CANCEL</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDHrIBHOkeixoLagY9f2JfFqWpQRFj8MeE",
        authDomain: "aiden-reminders.firebaseapp.com",
        databaseURL: "https://aiden-reminders-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "aiden-reminders",
        storageBucket: "aiden-reminders.firebasestorage.app",
        messagingSenderId: "87284883715",
        appId: "1:87284883715:web:c2de76ab3d2f1170084936"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'reminders');

    let reminders = [];
    let isEditMode = false;
    let alertedIds = new Set();

    // --- REINFORCED NOTIFICATION HEARTBEAT ---
    setInterval(() => {
        const now = new Date();
        // Convert to local ISO string for comparison
        const offset = now.getTimezoneOffset() * 60000;
        const localISOTime = new Date(now.getTime() - offset).toISOString().slice(0, 16);

        reminders.forEach(rem => {
            if (rem.time === localISOTime && !alertedIds.has(rem.id)) {
                if (Notification.permission === "granted") {
                    new Notification("Gothic Archive Reminder", {
                        body: rem.text,
                        icon: 'https://your-hosted-path.com/gothic-brain-icon.png'
                    });
                }
                alert("RITUAL ALERT: " + rem.text);
                alertedIds.add(rem.id);
            }
        });
    }, 10000); // Checks every 10 seconds

    window.requestNotify = () => {
        Notification.requestPermission().then(p => {
            alert("Notification Permission: " + p);
        });
    };

    // --- INTERFACE PROTOCOL ---
    window.toggleEditMode = () => {
        isEditMode = !isEditMode;
        document.body.classList.toggle('edit-mode', isEditMode);
        document.getElementById('edit-toggle').classList.toggle('active', isEditMode);
        renderArchive();
    };

    window.openModal = (id = null) => {
        const select = document.getElementById('widget-select');
        select.innerHTML = '<option value="new">-- Create New Widget --</option>';
        const uniqueWidgets = [...new Set(reminders.map(r => r.widget))].filter(Boolean);
        uniqueWidgets.forEach(n => {
            select.innerHTML += `<option value="${n}">${n}</option>`;
        });

        if (id) {
            const rem = reminders.find(r => r.id === id);
            document.getElementById('edit-id').value = id;
            document.getElementById('rem-text').value = rem.text || '';
            document.getElementById('rem-time').value = rem.time || '';
            document.getElementById('rem-link').value = rem.link || '';
            document.getElementById('widget-select').value = rem.widget || 'new';
            document.getElementById('modal-title').innerText = "MODIFY RITUAL";
        } else {
            document.getElementById('edit-id').value = '';
            document.getElementById('rem-text').value = '';
            document.getElementById('rem-time').value = '';
            document.getElementById('rem-link').value = '';
            document.getElementById('modal-title').innerText = "NEW ARCHIVE ENTRY";
        }
        document.getElementById('modal-overlay').style.display = 'flex';
        window.toggleWidgetInput();
    };

    window.closeModal = () => {
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('rem-file').value = ''; // Reset file input
    };

    window.toggleWidgetInput = () => {
        const isNew = document.getElementById('widget-select').value === 'new';
        document.getElementById('new-widget-name').style.display = isNew ? 'block' : 'none';
    };

    // --- DATA PROTOCOL ---
    onValue(dbRef, (snapshot) => {
        const data = snapshot.val();
        reminders = data ? Object.keys(data).map(key => ({ ...data[key], id: key })) : [];
        renderArchive();
    });

    window.saveReminder = () => {
        const id = document.getElementById('edit-id').value;
        const text = document.getElementById('rem-text').value;
        const time = document.getElementById('rem-time').value;
        const link = document.getElementById('rem-link').value;
        const widgetSelect = document.getElementById('widget-select').value;
        const widgetName = (widgetSelect === 'new') ? document.getElementById('new-widget-name').value : widgetSelect;
        const file = document.getElementById('rem-file').files[0];

        if (!text || !widgetName) return alert("Archive Error: Ritual name and Widget required.");

        const finalize = (imgData = null) => {
            const payload = { text, time, link, widget: widgetName };
            if (imgData) payload.image = imgData;

            if (id) {
                update(ref(db, `reminders/${id}`), payload).then(() => closeModal());
            } else {
                push(dbRef, payload).then(() => closeModal());
            }
        };

        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => finalize(e.target.result);
            reader.readAsDataURL(file);
        } else {
            // If editing and no new file selected, preserve existing image if possible 
            // (Standard update logic in Firebase handles this by only updating provided keys)
            finalize();
        }
    };

    window.deleteReminder = (id) => {
        if(confirm("Permanently erase this entry from the archive?")) {
            remove(ref(db, `reminders/${id}`));
        }
    };

    // --- SORTABLE & DRAG LOGIC ---
    function initSortable() {
        if (isEditMode) return; // Disable dragging when in Edit Mode so clicks work

        const items = document.querySelectorAll('.reminder-item');
        const lists = document.querySelectorAll('.reminder-list');

        items.forEach(item => {
            item.addEventListener('dragstart', () => item.classList.add('dragging'));
            item.addEventListener('dragend', () => item.classList.remove('dragging'));
        });

        lists.forEach(list => {
            list.addEventListener('dragover', e => {
                e.preventDefault();
                const dragging = document.querySelector('.dragging');
                if (!dragging) return;
                const afterElement = getDragAfterElement(list, e.clientY);
                if (afterElement == null) list.appendChild(dragging);
                else list.insertBefore(dragging, afterElement);
            });

            list.addEventListener('drop', () => {
                const dragging = document.querySelector('.dragging');
                if (!dragging) return;
                const newWidget = list.closest('.widget-box').getAttribute('data-name');
                const id = dragging.getAttribute('data-id');
                update(ref(db, `reminders/${id}`), { widget: newWidget });
            });
        });
    }

    function getDragAfterElement(container, y) {
        const draggables = [...container.querySelectorAll('.reminder-item:not(.dragging)')];
        return draggables.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = y - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) return { offset, element: child };
            else return closest;
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function renderArchive() {
        const container = document.getElementById('widget-display-area');
        container.innerHTML = '';
        
        const groups = reminders.reduce((acc, curr) => {
            if (!acc[curr.widget]) acc[curr.widget] = [];
            acc[curr.widget].push(curr);
            return acc;
        }, {});

        Object.keys(groups).forEach(name => {
            const box = document.createElement('div');
            box.className = 'widget-box';
            box.setAttribute('data-name', name);
            box.innerHTML = `<div class="widget-title">${name}</div><div class="reminder-list"></div>`;
            
            groups[name].forEach(item => {
                const div = document.createElement('div');
                div.className = 'reminder-item';
                div.draggable = !isEditMode; // Toggle draggable status
                div.setAttribute('data-id', item.id);
                
                // Display time cleanly
                const displayTime = item.time ? item.time.replace('T', ' ') : 'No Time Set';

                div.innerHTML = `
                    <div class="reminder-header">
                        <input type="checkbox" onchange="deleteReminder('${item.id}')">
                        <span onclick="if(isEditMode) openModal('${item.id}')">${item.text}</span>
                        <div class="reminder-time-label">${displayTime}</div>
                    </div>
                    ${item.image ? `<img src="${item.image}">` : ''}
                    ${item.link ? `<a href="${item.link}" target="_blank" style="color:var(--highlight); font-size:0.6rem; margin-top:4px;">View Link</a>` : ''}
                `;
                box.querySelector('.reminder-list').appendChild(div);
            });
            container.appendChild(box);
        });
        
        initSortable();
    }
</script>
</body>
</html>
