<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gothic Archive: Reminders</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-color: #1a1a1a;
            --accent-color: #4a0404;
            --text-color: #d1d1d1;
            --border-color: #333;
            --highlight: #8b0000;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Georgia', serif;
            margin: 0;
            overflow-x: hidden;
            touch-action: pan-y;
        }

        #header-container {
            width: 100%;
            height: 200px;
            border-bottom: 2px solid var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        #header-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
        }

        #header-upload-btn {
            position: absolute;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--accent-color);
            color: white;
            padding: 8px;
            cursor: pointer;
            display: none;
        }

        .admin-bar {
            background: var(--panel-color);
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        button {
            background: #222;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 15px;
            cursor: pointer;
        }

        button.active {
            border-color: var(--highlight);
            box-shadow: 0 0 10px var(--accent-color);
        }

        #reminder-container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .reminder-widget {
            background: var(--panel-color);
            border: 1px solid var(--border-color);
            padding: 15px;
            position: relative;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
        }

        .edit-mode .reminder-widget { outline: 1px dashed var(--highlight); }

        .reminder-widget img {
            max-width: 100%;
            height: auto;
            margin-top: 10px;
            border: 1px solid var(--border-color);
        }

        .reminder-widget a {
            color: var(--highlight);
            text-decoration: none;
            display: block;
            margin-top: 5px;
        }

        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: var(--panel-color);
            padding: 25px;
            border: 2px solid var(--accent-color);
            width: 90%;
            max-width: 400px;
        }

        input { width: 100%; background: #000; border: 1px solid var(--border-color); color: white; margin: 10px 0; padding: 8px; }
    </style>
</head>
<body>

<div class="admin-bar">
    <button id="edit-toggle" onclick="toggleEditMode()">Enable Edit Mode</button>
    <button onclick="openModal()">+ Add Reminder</button>
</div>

<div id="header-container">
    <input type="file" id="header-input" style="display:none" onchange="handleHeaderUpload(this)">
    <button id="header-upload-btn" onclick="document.getElementById('header-input').click()">Change Header Image</button>
    <img id="header-img" src="" alt="Header">
</div>

<div id="reminder-container"></div>

<div id="modal-overlay">
    <div class="modal">
        <h3>New Ritual Reminder</h3>
        <input type="text" id="rem-text" placeholder="Task Name">
        <input type="text" id="rem-link" placeholder="Link (URL)">
        <input type="file" id="rem-file" accept="image/*">
        <div style="display:flex; gap:10px;">
            <button onclick="addReminder()">Save to Archive</button>
            <button onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    // Your Config
    const firebaseConfig = {
        apiKey: "AIzaSyDHrIBHOkeixoLagY9f2JfFqWpQRFj8MeE",
        authDomain: "aiden-reminders.firebaseapp.com",
        databaseURL: "https://aiden-reminders-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "aiden-reminders",
        storageBucket: "aiden-reminders.firebasestorage.app",
        messagingSenderId: "87284883715",
        appId: "1:87284883715:web:c2de76ab3d2f1170084936"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // STATE
    let editMode = false;
    let reminders = [];

    // TOGGLE EDIT
    window.toggleEditMode = () => {
        editMode = !editMode;
        document.body.classList.toggle('edit-mode', editMode);
        document.getElementById('edit-toggle').classList.toggle('active', editMode);
        document.getElementById('header-upload-btn').style.display = editMode ? 'block' : 'none';
        document.getElementById('edit-toggle').innerText = editMode ? "Lock Archive" : "Enable Edit Mode";
    };

    // MODAL LOGIC
    window.openModal = () => document.getElementById('modal-overlay').style.display = 'flex';
    window.closeModal = () => {
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('rem-text').value = '';
        document.getElementById('rem-link').value = '';
        document.getElementById('rem-file').value = '';
    };

    // SYNC HEADER
    onValue(ref(db, 'header'), (snapshot) => {
        const url = snapshot.val();
        if (url) document.getElementById('header-img').src = url;
    });

    window.handleHeaderUpload = (input) => {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => set(ref(db, 'header'), e.target.result);
            reader.readAsDataURL(input.files[0]);
        }
    };

    // SYNC REMINDERS
    onValue(ref(db, 'reminders'), (snapshot) => {
        const data = snapshot.val();
        reminders = data ? Object.keys(data).map(key => ({ ...data[key], id: key })) : [];
        renderReminders();
    });

    window.addReminder = () => {
        const text = document.getElementById('rem-text').value;
        const link = document.getElementById('rem-link').value;
        const file = document.getElementById('rem-file').files[0];

        const upload = (imgBase64 = null) => {
            push(ref(db, 'reminders'), { text, link, image: imgBase64 });
            closeModal();
        };

        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => upload(e.target.result);
            reader.readAsDataURL(file);
        } else {
            upload();
        }
    };

    window.deleteReminder = (id) => {
        if (confirm("Have you completed this ritual? (Delete reminder)")) {
            remove(ref(db, `reminders/${id}`));
        }
    };

    function renderReminders() {
        const container = document.getElementById('reminder-container');
        container.innerHTML = '';
        reminders.forEach(rem => {
            const div = document.createElement('div');
            div.className = 'reminder-widget';
            div.innerHTML = `
                <input type="checkbox" onchange="deleteReminder('${rem.id}')">
                <span style="margin-left:10px">${rem.text}</span>
                ${rem.link ? `<a href="${rem.link}" target="_blank">Open Link</a>` : ''}
                ${rem.image ? `<img src="${rem.image}">` : ''}
            `;
            container.appendChild(div);
        });
    }
</script>
</body>
</html>
