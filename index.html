<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://your-hosted-path.com/gothic-brain-icon.png">
    <title>Gothic Archive: Sentinel Home</title>
    <style>
        :root {
            --bg-color: #000000;
            --panel-color: #0a0a0a;
            --accent-color: #4a0404;
            --highlight: #8b0000;
            --text-color: #e0e0e0;
            --gloss: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 50%);
            --on-glow: #00ff41;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Georgia', serif;
            margin: 0;
            padding-bottom: 100px;
            user-select: none;
            overflow-x: hidden;
        }

        .admin-bar {
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(25px);
            padding: 15px;
            border-bottom: 1px solid var(--accent-color);
            display: flex;
            gap: 8px;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .admin-bar button {
            background: #111;
            color: var(--text-color);
            border: 1px solid #333;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .notif-toggle.active {
            border-color: var(--on-glow);
            box-shadow: 0 0 8px var(--on-glow);
            color: var(--on-glow);
        }

        #edit-btn.active {
            background: var(--accent-color);
            border-color: var(--highlight);
            box-shadow: 0 0 10px var(--highlight);
        }

        /* --- HALF-SIZE WIDGET GRID --- */
        #widget-display-area {
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 15px;
            align-items: start;
        }

        .widget-box {
            background: var(--panel-color);
            border: 1px solid #1a1a1a;
            padding: 15px;
            border-radius: 25px;
            position: relative;
            box-sizing: border-box;
            transition: height 0.3s ease;
            min-height: 100px;
        }

        .widget-title {
            font-size: 0.75rem;
            color: #cc6666;
            text-align: center;
            margin-bottom: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .reminder-item {
            background: #000000;
            border-radius: 15px;
            padding: 12px;
            border: 1px solid #181818;
            margin-bottom: 8px;
            position: relative;
            width: 100%;
            box-sizing: border-box;
        }

        .reminder-item::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--gloss);
            border-radius: 15px;
            pointer-events: none;
        }

        .edit-active .reminder-item { border: 1px dashed var(--highlight); cursor: pointer; }

        .reminder-header {
            display: flex;
            flex-direction: column; /* Stacked for half-size widgets */
            gap: 5px;
            width: 100%;
        }

        .reminder-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .reminder-header input[type="checkbox"] {
            width: 18px; height: 18px;
        }

        .reminder-header span { 
            word-wrap: break-word;
            line-height: 1.3;
            font-size: 0.85rem;
        }

        .time-tag {
            font-size: 0.6rem;
            color: #555;
        }

        .reminder-item img {
            width: 100%;
            border-radius: 10px;
            margin-top: 8px;
        }

        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal {
            background: #050505;
            padding: 25px;
            border: 1px solid var(--accent-color);
            border-radius: 30px;
            width: 90%;
            max-width: 380px;
        }

        input, select {
            width: 100%; background: #000; border: 1px solid #222;
            color: white; margin: 8px 0; padding: 12px; border-radius: 12px;
            font-size: 0.9rem; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="admin-bar">
    <button id="edit-btn" onclick="toggleEditMode()">Edit</button>
    <button onclick="openModal()">+ Add</button>
    <button id="notif-toggle" class="notif-toggle" onclick="requestSentinel()">Notifs</button>
    <button onclick="location.reload()">Sync</button>
</div>

<div id="widget-display-area"></div>

<div id="modal-overlay">
    <div class="modal">
        <h3 id="modal-title" style="color:var(--highlight); text-align:center;">MODIFICATION</h3>
        <input type="hidden" id="edit-id">
        <input type="text" id="rem-text" placeholder="Title">
        <input type="datetime-local" id="rem-time">
        <select id="widget-select" onchange="toggleWidgetInput()">
            <option value="new">-- New Widget --</option>
        </select>
        <input type="text" id="new-widget-name" placeholder="Widget Name..." style="display:none;">
        <input type="file" id="rem-file" accept="image/*">
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button style="flex:1; background:var(--accent-color); color:white; border:none; padding:12px; border-radius:15px;" onclick="saveReminder()">BIND</button>
            <button style="flex:1; background:#222; color:white; border:none; padding:12px; border-radius:15px;" onclick="closeModal()">EXIT</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDHrIBHOkeixoLagY9f2JfFqWpQRFj8MeE",
        authDomain: "aiden-reminders.firebaseapp.com",
        databaseURL: "https://aiden-reminders-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "aiden-reminders",
        storageBucket: "aiden-reminders.firebasestorage.app",
        messagingSenderId: "87284883715",
        appId: "1:87284883715:web:c2de76ab3d2f1170084936"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'reminders');

    let reminders = [];
    let isEditMode = false;
    let notifiedSet = new Set();

    // --- NOTIFICATION FIX: IOS SENTINEL ---
    window.requestSentinel = () => {
        Notification.requestPermission().then(permission => {
            updateNotifButton(permission);
            if(permission === "granted") {
                // Test notification to "wake up" the service
                const n = new Notification("Sentinel Active", { body: "Home Screen Notifications Synced." });
            }
        });
    };

    function updateNotifButton(perm) {
        const btn = document.getElementById('notif-toggle');
        btn.classList.toggle('active', perm === "granted");
        btn.innerText = perm === "granted" ? "Notifs: On" : "Notifs: Off";
    }

    // High-frequency heartbeat to prevent iOS from sleeping the app context
    setInterval(() => {
        const now = new Date();
        const localStr = new Date(now.getTime() - (now.getTimezoneOffset() * 60000)).toISOString().slice(0, 16);
        
        reminders.forEach(r => {
            if (r.time === localStr && !notifiedSet.has(r.id)) {
                if (Notification.permission === "granted") {
                    new Notification("ARCHIVE ALERT", { 
                        body: r.text,
                        requireInteraction: true // Keeps it on screen longer
                    });
                }
                alert("!! " + r.text);
                notifiedSet.add(r.id);
            }
        });
    }, 5000); // Check every 5 seconds

    // --- LOGIC ---
    window.toggleEditMode = () => {
        isEditMode = !isEditMode;
        document.body.classList.toggle('edit-active', isEditMode);
        document.getElementById('edit-btn').classList.toggle('active', isEditMode);
        renderArchive();
    };

    window.openModal = (id = null) => {
        const select = document.getElementById('widget-select');
        select.innerHTML = '<option value="new">-- New Widget --</option>';
        [...new Set(reminders.map(r => r.widget))].filter(Boolean).forEach(w => {
            select.innerHTML += `<option value="${w}">${w}</option>`;
        });
        if (id) {
            const r = reminders.find(item => item.id === id);
            document.getElementById('edit-id').value = id;
            document.getElementById('rem-text').value = r.text;
            document.getElementById('rem-time').value = r.time || '';
            document.getElementById('widget-select').value = r.widget;
        } else {
            document.getElementById('edit-id').value = '';
            document.getElementById('rem-text').value = '';
            document.getElementById('rem-time').value = '';
        }
        document.getElementById('modal-overlay').style.display = 'flex';
        window.toggleWidgetInput();
    };

    window.closeModal = () => document.getElementById('modal-overlay').style.display = 'none';

    window.toggleWidgetInput = () => {
        document.getElementById('new-widget-name').style.display = (document.getElementById('widget-select').value === 'new') ? 'block' : 'none';
    };

    onValue(dbRef, (snap) => {
        const data = snap.val();
        reminders = data ? Object.keys(data).map(k => ({ ...data[k], id: k })) : [];
        renderArchive();
        updateNotifButton(Notification.permission);
    });

    window.saveReminder = () => {
        const id = document.getElementById('edit-id').value;
        const text = document.getElementById('rem-text').value;
        const time = document.getElementById('rem-time').value;
        const wSel = document.getElementById('widget-select').value;
        const wName = (wSel === 'new') ? document.getElementById('new-widget-name').value : wSel;
        const file = document.getElementById('rem-file').files[0];

        if (!text || !wName) return;

        const pushData = (img = null) => {
            const payload = { text, time, widget: wName };
            if (img) payload.image = img;
            if (id) update(ref(db, `reminders/${id}`), payload);
            else push(dbRef, payload);
            closeModal();
        };

        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => pushData(e.target.result);
            reader.readAsDataURL(file);
        } else pushData();
    };

    window.deleteReminder = (id) => { if (confirm("Erase?")) remove(ref(db, `reminders/${id}`)); };

    function renderArchive() {
        const area = document.getElementById('widget-display-area');
        area.innerHTML = '';
        const groups = reminders.reduce((acc, r) => {
            if (!acc[r.widget]) acc[r.widget] = [];
            acc[r.widget].push(r);
            return acc;
        }, {});

        Object.keys(groups).forEach(name => {
            const box = document.createElement('div');
            box.className = 'widget-box';
            box.innerHTML = `<div class="widget-title">${name}</div><div class="reminder-list" data-w="${name}"></div>`;
            
            groups[name].forEach(item => {
                const div = document.createElement('div');
                div.className = 'reminder-item';
                div.setAttribute('data-id', item.id);
                if (!isEditMode) div.draggable = true;
                div.onclick = (e) => { if (isEditMode && e.target.type !== 'checkbox') openModal(item.id); };

                div.innerHTML = `
                    <div class="reminder-header">
                        <div class="reminder-header-top">
                             <input type="checkbox" onchange="deleteReminder('${item.id}')">
                             <div class="time-tag">${item.time ? item.time.split('T')[1] : ''}</div>
                        </div>
                        <span>${item.text}</span>
                    </div>
                    ${item.image ? `<img src="${item.image}">` : ''}
                `;
                box.querySelector('.reminder-list').appendChild(div);
            });
            area.appendChild(box);
        });
        if (!isEditMode) initDrag();
    }

    function initDrag() {
        const items = document.querySelectorAll('.reminder-item');
        const lists = document.querySelectorAll('.reminder-list');
        items.forEach(i => {
            i.ondragstart = () => i.classList.add('dragging');
            i.ondragend = () => i.classList.remove('dragging');
        });
        lists.forEach(l => {
            l.ondragover = e => {
                e.preventDefault();
                const d = document.querySelector('.dragging');
                if (!d) return;
                l.appendChild(d);
            };
            l.ondrop = () => {
                const d = document.querySelector('.dragging');
                if (!d) return;
                update(ref(db, `reminders/${d.getAttribute('data-id')}`), { widget: l.getAttribute('data-w') });
            };
        });
    }
</script>
</body>
</html>
