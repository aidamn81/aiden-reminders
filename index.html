<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gothic Archive: Widgets & Reminders</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-color: #1a1a1a;
            --accent-color: #4a0404;
            --text-color: #d1d1d1;
            --border-color: #333;
            --highlight: #8b0000;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Georgia', serif;
            margin: 0;
            overflow-x: hidden;
            touch-action: pan-y;
        }

        .admin-bar {
            background: var(--panel-color);
            padding: 20px;
            border-bottom: 2px solid var(--accent-color);
            display: flex;
            gap: 20px;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .admin-bar button {
            background: #222;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button.active {
            background: var(--accent-color);
            border-color: var(--highlight);
            box-shadow: 0 0 15px var(--highlight);
        }

        /* Widget Layout */
        #widget-display-area {
            padding: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
        }

        .widget-box {
            background: var(--panel-color);
            border: 1px solid var(--accent-color);
            width: 320px;
            min-height: 150px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .widget-title {
            font-size: 1.4rem;
            color: var(--highlight);
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 15px;
            padding-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Reminder Items */
        .reminder-item {
            background: #000;
            border-left: 3px solid var(--accent-color);
            margin-bottom: 12px;
            padding: 12px;
            position: relative;
        }

        .reminder-item span { display: block; margin-bottom: 5px; font-weight: bold; }
        .reminder-time { color: #888; font-size: 0.75rem; font-style: italic; }
        
        .reminder-item img {
            max-width: 100%;
            height: auto;
            margin-top: 10px;
            border: 1px solid var(--border-color);
        }

        .reminder-item a {
            color: var(--highlight);
            font-size: 0.8rem;
            text-decoration: none;
            display: inline-block;
            margin-top: 5px;
        }

        /* Modal Customization */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            overflow-y: auto;
        }

        .modal {
            background: var(--panel-color);
            padding: 30px;
            border: 2px solid var(--accent-color);
            width: 90%;
            max-width: 450px;
        }

        label { display: block; margin-top: 15px; font-size: 0.8rem; color: #888; text-transform: uppercase; }
        input, select { 
            width: 100%; 
            background: #000; 
            border: 1px solid var(--border-color); 
            color: white; 
            margin-top: 5px; 
            padding: 12px; 
            box-sizing: border-box;
            font-family: 'Georgia', serif;
        }

        input[type="checkbox"] { width: auto; transform: scale(1.3); margin-right: 10px; cursor: pointer; }

        @media (max-width: 768px) {
            .admin-bar { flex-direction: column; align-items: center; gap: 10px; }
            .widget-box { width: 100%; }
        }
    </style>
</head>
<body>

<div class="admin-bar">
    <button id="edit-toggle" onclick="toggleEditMode()">Enable Edit Mode</button>
    <button onclick="openModal()">+ Add Reminder</button>
</div>

<div id="widget-display-area">
    </div>

<div id="modal-overlay">
    <div class="modal">
        <h2 style="color:var(--highlight); margin:0 0 20px 0; text-align:center;">ARCHIVE ENTRY</h2>
        
        <label>The Task</label>
        <input type="text" id="rem-text" placeholder="What must be done?">
        
        <label>Appointed Time</label>
        <input type="datetime-local" id="rem-time">

        <label>Destination Widget</label>
        <select id="widget-select" onchange="toggleWidgetInput()">
            <option value="new">-- Create New Widget --</option>
        </select>
        <input type="text" id="new-widget-name" placeholder="Enter new widget name..." style="display:block;">

        <label>Source Link</label>
        <input type="text" id="rem-link" placeholder="https://...">

        <label>Visual Evidence (Image)</label>
        <input type="file" id="rem-file" accept="image/*">

        <div style="display:flex; gap:15px; margin-top:25px;">
            <button style="flex:1; background:var(--accent-color); color:white; border:none; padding:15px; cursor:pointer;" onclick="addReminder()">BIND</button>
            <button style="flex:1; background:#222; color:white; border:none; padding:15px; cursor:pointer;" onclick="closeModal()">CANCEL</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDHrIBHOkeixoLagY9f2JfFqWpQRFj8MeE",
        authDomain: "aiden-reminders.firebaseapp.com",
        databaseURL: "https://aiden-reminders-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "aiden-reminders",
        storageBucket: "aiden-reminders.firebasestorage.app",
        messagingSenderId: "87284883715",
        appId: "1:87284883715:web:c2de76ab3d2f1170084936"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'reminders');

    let reminders = [];
    let editMode = false;

    // --- INTERFACE LOGIC ---

    window.toggleEditMode = () => {
        editMode = !editMode;
        document.body.classList.toggle('edit-mode', editMode);
        document.getElementById('edit-toggle').classList.toggle('active', editMode);
        document.getElementById('edit-toggle').innerText = editMode ? "Lock Archive" : "Enable Edit Mode";
    };

    window.toggleWidgetInput = () => {
        const select = document.getElementById('widget-select');
        const input = document.getElementById('new-widget-name');
        input.style.display = (select.value === 'new') ? 'block' : 'none';
    };

    window.openModal = () => {
        // Populating existing widget names into the select
        const select = document.getElementById('widget-select');
        select.innerHTML = '<option value="new">-- Create New Widget --</option>';
        
        const uniqueWidgets = [...new Set(reminders.map(r => r.widget))].filter(Boolean);
        uniqueWidgets.forEach(name => {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            select.appendChild(opt);
        });

        document.getElementById('modal-overlay').style.display = 'flex';
    };

    window.closeModal = () => {
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('rem-text').value = '';
        document.getElementById('rem-time').value = '';
        document.getElementById('rem-link').value = '';
        document.getElementById('new-widget-name').value = '';
        document.getElementById('rem-file').value = '';
    };

    // --- DATA HANDLING ---

    onValue(dbRef, (snapshot) => {
        const data = snapshot.val();
        reminders = data ? Object.keys(data).map(key => ({ ...data[key], id: key })) : [];
        renderArchive();
    });

    window.addReminder = () => {
        const text = document.getElementById('rem-text').value;
        const time = document.getElementById('rem-time').value;
        const link = document.getElementById('rem-link').value;
        const selectVal = document.getElementById('widget-select').value;
        const newName = document.getElementById('new-widget-name').value;
        const file = document.getElementById('rem-file').files[0];

        const targetWidget = (selectVal === 'new') ? newName : selectVal;

        if (!text || !targetWidget) {
            alert("The ritual requires a task and a widget name.");
            return;
        }

        const finalizePush = (imgData = null) => {
            push(dbRef, {
                text: text,
                time: time,
                link: link,
                widget: targetWidget,
                image: imgData
            });
            closeModal();
        };

        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => finalizePush(e.target.result);
            reader.readAsDataURL(file);
        } else {
            finalizePush();
        }
    };

    window.deleteReminder = (id) => {
        if (confirm("Purge this reminder from existence?")) {
            const itemRef = ref(db, `reminders/${id}`);
            remove(itemRef);
        }
    };

    function renderArchive() {
        const container = document.getElementById('widget-display-area');
        container.innerHTML = '';

        if (reminders.length === 0) {
            container.innerHTML = '<p style="opacity:0.5; font-style:italic;">The archive is currently empty...</p>';
            return;
        }

        // Group by Widget Name
        const groups = reminders.reduce((acc, curr) => {
            if (!acc[curr.widget]) acc[curr.widget] = [];
            acc[curr.widget].push(curr);
            return acc;
        }, {});

        Object.keys(groups).forEach(widgetName => {
            const box = document.createElement('div');
            box.className = 'widget-box';
            
            let itemsHtml = groups[widgetName].map(item => `
                <div class="reminder-item">
                    <div style="display:flex; align-items:flex-start;">
                        <input type="checkbox" onchange="deleteReminder('${item.id}')">
                        <div>
                            <span>${item.text}</span>
                            <div class="reminder-time">${item.time ? item.time.replace('T', ' @ ') : 'Undated'}</div>
                            ${item.link ? `<a href="${item.link}" target="_blank">View Link</a>` : ''}
                        </div>
                    </div>
                    ${item.image ? `<img src="${item.image}">` : ''}
                </div>
            `).join('');

            box.innerHTML = `
                <div class="widget-title">${widgetName}</div>
                <div class="reminder-list">${itemsHtml}</div>
            `;
            container.appendChild(box);
        });
    }
</script>
</body>
</html>
