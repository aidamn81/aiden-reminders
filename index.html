<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Archive">

    <link rel="apple-touch-icon" href="https://your-hosted-path.com/gothic-brain-icon.png">
    
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIkdvdGhpYyBBcmNoaXZlIFJlbWluZGVycyIsCiAgInNob3J0X25hbWUiOiAiQXJjaGl2ZSIsCiAgImljb25zIjogWwogICAgewogICAgICAic3JjIjogImh0dHBzOi8veW91ci1ob3N0ZWQtcGF0aC5jb20vZ290aGljLWJyYWluLWljb24ucG5nIiwKICAgICAgInNpemVzIjogIjUxMng1MTIiLAogICAgICAidHlwZSI6ICJpbWFnZS9wbmciCiAgICB9CiAgXSwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMwNTA1MDUiLAogICJ0aGVtZV9jb2xvciI6ICIjMDUwNTA1Igp9">
    <title>Gothic Archive: Gloss Edition</title>
    <style>
        :root {
            /* DEEP BLACK BACKGROUND (SURGICAL CONFIRMATION) */
            --bg-color: #050505;
            --panel-color: rgba(26, 26, 26, 0.85);
            --accent-color: #4a0404;
            --text-color: #e0e0e0;
            --border-color: #333;
            --highlight: #8b0000;
            --gloss: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 50%);
        }

        body {
            background-color: var(--bg-color); /* Applied true black */
            color: var(--text-color);
            font-family: 'Georgia', serif;
            margin: 0;
            padding-top: 20px; /* Space for status bar when fullscreen */
            padding-bottom: 50px;
            user-select: none;
        }

        /* --- PRESERVED NAVIGATION --- */
        .admin-bar {
            background: var(--panel-color);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-bottom: 1px solid var(--accent-color);
            display: flex;
            gap: 12px;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
        }

        .admin-bar button {
            background: #111;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .admin-bar button.active {
            background: var(--accent-color);
            border-color: var(--highlight);
            box-shadow: 0 0 15px var(--highlight);
        }

        /* --- GLOSSY ROUNDED WIDGETS (PRESERVED) --- */
        #widget-display-area {
            padding: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
        }

        .widget-box {
            background: var(--panel-color);
            border: 1px solid rgba(74, 4, 4, 0.4);
            width: 310px;
            min-height: 100px;
            padding: 15px;
            border-radius: 25px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        .widget-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 50%;
            background: var(--gloss);
            pointer-events: none;
            border-radius: 25px 25px 0 0;
        }

        .widget-title {
            font-size: 1.1rem;
            color: var(--highlight);
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 5px;
        }

        .reminder-list {
            min-height: 40px;
        }

        .reminder-item {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            margin-bottom: 6px;
            padding: 6px 10px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.03);
            cursor: grab;
        }

        .reminder-item.dragging { opacity: 0.3; }

        .reminder-item span { flex-grow: 1; }

        .edit-mode .reminder-item span { color: var(--highlight); text-decoration: underline; }

        /* --- MODAL (PRESERVED) --- */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: #111;
            padding: 25px;
            border: 1px solid var(--accent-color);
            border-radius: 30px;
            width: 85%;
            max-width: 400px;
        }

        input, select { 
            width: 100%; background: #000; border: 1px solid #333; 
            color: white; margin: 8px 0; padding: 10px; border-radius: 10px; 
        }
    </style>
</head>
<body>

<div class="admin-bar">
    <button id="edit-toggle" onclick="toggleEditMode()">Edit Mode</button>
    <button onclick="openModal()">+ Add Reminder</button>
    <button onclick="location.reload()" style="border-color: #444;">Refresh App</button>
</div>

<div id="widget-display-area"></div>

<div id="modal-overlay">
    <div class="modal">
        <h3 id="modal-title" style="color:var(--highlight); text-align:center; margin-top:0;">ARCHIVE ENTRY</h3>
        <input type="hidden" id="edit-id">
        <input type="text" id="rem-text" placeholder="Ritual Name">
        <input type="datetime-local" id="rem-time">
        <select id="widget-select" onchange="toggleWidgetInput()">
            <option value="new">-- New Widget --</option>
        </select>
        <input type="text" id="new-widget-name" placeholder="Widget Name...">
        <input type="text" id="rem-link" placeholder="Source Link (Optional)">
        <input type="file" id="rem-file" accept="image/*">
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button style="flex:1; background:var(--accent-color); color:white; border:none; padding:12px; border-radius:15px;" onclick="saveReminder()">BIND</button>
            <button style="flex:1; background:#222; color:white; border:none; padding:12px; border-radius:15px;" onclick="closeModal()">CANCEL</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDHrIBHOkeixoLagY9f2JfFqWpQRFj8MeE",
        authDomain: "aiden-reminders.firebaseapp.com",
        databaseURL: "https://aiden-reminders-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "aiden-reminders",
        storageBucket: "aiden-reminders.firebasestorage.app",
        messagingSenderId: "87284883715",
        appId: "1:87284883715:web:c2de76ab3d2f1170084936"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'reminders');

    let reminders = [];
    let isEditMode = false;

    // --- PRESERVED LOGIC ---

    window.toggleEditMode = () => {
        isEditMode = !isEditMode;
        document.getElementById('edit-toggle').classList.toggle('active', isEditMode);
        renderArchive();
    };

    window.openModal = (id = null) => {
        const select = document.getElementById('widget-select');
        select.innerHTML = '<option value="new">-- New Widget --</option>';
        [...new Set(reminders.map(r => r.widget))].filter(Boolean).forEach(n => {
            select.innerHTML += `<option value="${n}">${n}</option>`;
        });

        if (id) {
            const rem = reminders.find(r => r.id === id);
            document.getElementById('edit-id').value = id;
            document.getElementById('rem-text').value = rem.text;
            document.getElementById('rem-time').value = rem.time || '';
            document.getElementById('rem-link').value = rem.link || '';
            document.getElementById('widget-select').value = rem.widget;
            document.getElementById('modal-title').innerText = "EDIT RITUAL";
        } else {
            document.getElementById('edit-id').value = '';
            document.getElementById('rem-text').value = '';
            document.getElementById('rem-time').value = '';
            document.getElementById('rem-link').value = '';
            document.getElementById('modal-title').innerText = "ARCHIVE ENTRY";
        }
        document.getElementById('modal-overlay').style.display = 'flex';
        window.toggleWidgetInput();
    };

    window.closeModal = () => document.getElementById('modal-overlay').style.display = 'none';

    window.toggleWidgetInput = () => {
        const isNew = document.getElementById('widget-select').value === 'new';
        document.getElementById('new-widget-name').style.display = isNew ? 'block' : 'none';
    };

    onValue(dbRef, (snapshot) => {
        const data = snapshot.val();
        reminders = data ? Object.keys(data).map(key => ({ ...data[key], id: key })) : [];
        renderArchive();
    });

    window.saveReminder = () => {
        const id = document.getElementById('edit-id').value;
        const text = document.getElementById('rem-text').value;
        const time = document.getElementById('rem-time').value;
        const link = document.getElementById('rem-link').value;
        const widget = (document.getElementById('widget-select').value === 'new') 
            ? document.getElementById('new-widget-name').value 
            : document.getElementById('widget-select').value;
        const file = document.getElementById('rem-file').files[0];

        if (!text || !widget) return alert("Archive requires more detail.");

        const finalize = (imgData = null) => {
            const payload = { text, time, link, widget };
            if (imgData) payload.image = imgData;

            if (id) update(ref(db, `reminders/${id}`), payload);
            else push(dbRef, payload);
            closeModal();
        };

        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => finalize(e.target.result);
            reader.readAsDataURL(file);
        } else finalize();
    };

    window.deleteReminder = (id) => {
        if(confirm("Erase this reminder?")) remove(ref(db, `reminders/${id}`));
    };

    // --- PRESERVED DRAG & DROP ---
    function initSortable() {
        const items = document.querySelectorAll('.reminder-item');
        const lists = document.querySelectorAll('.reminder-list');

        items.forEach(item => {
            item.addEventListener('dragstart', () => item.classList.add('dragging'));
            item.addEventListener('dragend', () => item.classList.remove('dragging'));
        });

        lists.forEach(list => {
            list.addEventListener('dragover', e => {
                e.preventDefault();
                const dragging = document.querySelector('.dragging');
                const afterElement = getDragAfterElement(list, e.clientY);
                if (afterElement == null) {
                    list.appendChild(dragging);
                } else {
                    list.insertBefore(dragging, afterElement);
                }
            });

            list.addEventListener('drop', () => {
                const dragging = document.querySelector('.dragging');
                const newWidget = list.closest('.widget-box').getAttribute('data-name');
                const id = dragging.getAttribute('data-id');
                update(ref(db, `reminders/${id}`), { widget: newWidget });
            });
        });
    }

    function getDragAfterElement(container, y) {
        const draggableElements = [...container.querySelectorAll('.reminder-item:not(.dragging)')];
        return draggableElements.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = y - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) {
                return { offset: offset, element: child };
            } else {
                return closest;
            }
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    // --- PRESERVED RENDER ---
    function renderArchive() {
        const container = document.getElementById('widget-display-area');
        container.innerHTML = '';
        const groups = reminders.reduce((acc, curr) => {
            if (!acc[curr.widget]) acc[curr.widget] = [];
            acc[curr.widget].push(curr);
            return acc;
        }, {});

        Object.keys(groups).forEach(name => {
            const box = document.createElement('div');
            box.className = 'widget-box';
            box.setAttribute('data-name', name);
            box.innerHTML = `<div class="widget-title">${name}</div><div class="reminder-list"></div>`;
            
            groups[name].forEach(item => {
                const div = document.createElement('div');
                div.className = 'reminder-item';
                div.draggable = isEditMode;
                div.setAttribute('data-id', item.id);
                div.innerHTML = `
                    <input type="checkbox" onchange="deleteReminder('${item.id}')">
                    <span onclick="isEditMode ? openModal('${item.id}') : null">${item.text}</span>
                    <small style="font-size:0.65rem; color:#666;">${item.time ? item.time.split('T')[1] : ''}</small>`;
                box.querySelector('.reminder-list').appendChild(div);
            });
            container.appendChild(box);
        });
        if(isEditMode) initSortable();
    }
</script>
</body>
</html>
