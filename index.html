<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Gothic Archive</title>
    <style>
        :root {
            --bg-color: #000;
            --panel: #0a0a0a;
            --accent: #4a0404;
            --highlight: #8b0000;
            --text: #e0e0e0;
            --glow: #00ff41;
        }

        body {
            background: var(--bg-color);
            color: var(--text);
            font-family: 'Georgia', serif;
            margin: 0;
            padding-bottom: 100px;
            overflow-x: hidden;
            -webkit-user-select: none;
        }

        .admin-bar {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            padding: 15px;
            border-bottom: 1px solid var(--accent);
            display: flex;
            gap: 10px;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .admin-bar button {
            background: #111;
            color: var(--text);
            border: 1px solid #333;
            padding: 12px 14px;
            border-radius: 14px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* State Classes */
        .btn-active { border-color: var(--glow) !important; color: var(--glow) !important; box-shadow: 0 0 10px var(--glow); }
        .edit-on { background: var(--accent) !important; border-color: var(--highlight) !important; }

        #widget-display-area {
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 15px;
        }

        .widget-box {
            background: var(--panel);
            border: 1px solid #1a1a1a;
            padding: 15px;
            border-radius: 25px;
        }

        .widget-title {
            font-size: 0.7rem;
            color: #cc6666;
            text-align: center;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }

        .reminder-item {
            background: #000;
            border-radius: 15px;
            padding: 12px;
            border: 1px solid #181818;
            margin-bottom: 10px;
        }

        .edit-active .reminder-item { border: 1px dashed var(--highlight); }

        .time-tag { font-size: 0.6rem; color: #555; text-align: right; }
        span { font-size: 0.85rem; line-height: 1.4; display: block; margin-top: 4px; }

        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none;
            justify-content: center; align-items: center; z-index: 2000;
        }

        .modal { background: #050505; padding: 25px; border: 1px solid var(--accent); border-radius: 30px; width: 90%; max-width: 380px; }
        input, select { width: 100%; background: #000; border: 1px solid #222; color: white; margin: 8px 0; padding: 14px; border-radius: 12px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="admin-bar">
    <button id="btn-edit">Edit</button>
    <button id="btn-add">+ Add</button>
    <button id="btn-notif">Notifs</button>
    <button id="btn-sync">Sync</button>
</div>

<div id="widget-display-area"></div>

<div id="modal-overlay">
    <div class="modal">
        <h3 style="color:var(--highlight); text-align:center;">ARCHIVE BIND</h3>
        <input type="hidden" id="edit-id">
        <input type="text" id="rem-text" placeholder="Entry Title">
        <input type="datetime-local" id="rem-time">
        <select id="widget-select">
            <option value="new">-- New Widget --</option>
        </select>
        <input type="text" id="new-widget-name" placeholder="Widget Name..." style="display:none;">
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button id="btn-save" style="flex:1; background:var(--accent); color:white; border:none; padding:15px; border-radius:15px;">SAVE</button>
            <button id="btn-close" style="flex:1; background:#222; color:white; border:none; padding:15px; border-radius:15px;">EXIT</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDHrIBHOkeixoLagY9f2JfFqWpQRFj8MeE",
        authDomain: "aiden-reminders.firebaseapp.com",
        databaseURL: "https://aiden-reminders-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "aiden-reminders",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'reminders');

    let reminders = [];
    let isEditMode = false;

    // --- BINDING FUNCTIONS TO GLOBAL ---
    window.archiveControl = {
        toggleEdit: () => {
            isEditMode = !isEditMode;
            document.body.classList.toggle('edit-active', isEditMode);
            document.getElementById('btn-edit').classList.toggle('edit-on', isEditMode);
            renderArchive();
        },
        openModal: (id = null) => {
            const select = document.getElementById('widget-select');
            select.innerHTML = '<option value="new">-- New Widget --</option>';
            [...new Set(reminders.map(r => r.widget))].filter(Boolean).forEach(w => {
                select.innerHTML += `<option value="${w}">${w}</option>`;
            });
            if (id) {
                const r = reminders.find(item => item.id === id);
                document.getElementById('edit-id').value = id;
                document.getElementById('rem-text').value = r.text;
                document.getElementById('rem-time').value = r.time || '';
                document.getElementById('widget-select').value = r.widget;
            } else {
                document.getElementById('edit-id').value = '';
                document.getElementById('rem-text').value = '';
                document.getElementById('rem-time').value = '';
            }
            document.getElementById('modal-overlay').style.display = 'flex';
        },
        save: () => {
            const id = document.getElementById('edit-id').value;
            const text = document.getElementById('rem-text').value;
            const time = document.getElementById('rem-time').value;
            const wSel = document.getElementById('widget-select').value;
            const wName = (wSel === 'new') ? document.getElementById('new-widget-name').value : wSel;
            if (!text || !wName) return;
            const payload = { text, time, widget: wName };
            if (id) update(ref(db, `reminders/${id}`), payload);
            else push(dbRef, payload);
            document.getElementById('modal-overlay').style.display = 'none';
        }
    };

    // --- DATABASE LISTENER ---
    onValue(dbRef, (snap) => {
        const data = snap.val();
        reminders = data ? Object.keys(data).map(k => ({ ...data[k], id: k })) : [];
        renderArchive();
        if (navigator.serviceWorker.controller) {
            navigator.serviceWorker.controller.postMessage({ type: 'SYNC', data: reminders });
        }
    });

    function renderArchive() {
        const area = document.getElementById('widget-display-area');
        area.innerHTML = '';
        const groups = reminders.reduce((acc, r) => {
            if (!acc[r.widget]) acc[r.widget] = [];
            acc[r.widget].push(r);
            return acc;
        }, {});

        Object.keys(groups).forEach(name => {
            const box = document.createElement('div');
            box.className = 'widget-box';
            box.innerHTML = `<div class="widget-title">${name}</div><div class="reminder-list"></div>`;
            groups[name].forEach(item => {
                const div = document.createElement('div');
                div.className = 'reminder-item';
                div.onclick = () => { if (isEditMode) window.archiveControl.openModal(item.id); };
                div.innerHTML = `
                    <div class="time-tag">${item.time ? item.time.split('T')[1] : '--:--'}</div>
                    <span>${item.text}</span>
                    <input type="checkbox" style="margin-top:10px;" id="del-${item.id}">
                `;
                div.querySelector('input').onclick = (e) => {
                    e.stopPropagation();
                    if(confirm("Erase?")) remove(ref(db, `reminders/${item.id}`));
                };
                box.querySelector('.reminder-list').appendChild(div);
            });
            area.appendChild(box);
        });
    }

    // Register SW
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
</script>

<script>
    // --- PHYSICAL EVENT LISTENERS (The "iOS fix") ---
    document.getElementById('btn-edit').addEventListener('click', () => window.archiveControl.toggleEdit());
    document.getElementById('btn-add').addEventListener('click', () => window.archiveControl.openModal());
    document.getElementById('btn-sync').addEventListener('click', () => location.reload());
    document.getElementById('btn-close').addEventListener('click', () => document.getElementById('modal-overlay').style.display = 'none');
    document.getElementById('btn-save').addEventListener('click', () => window.archiveControl.save());
    document.getElementById('widget-select').addEventListener('change', (e) => {
        document.getElementById('new-widget-name').style.display = (e.target.value === 'new') ? 'block' : 'none';
    });

    document.getElementById('btn-notif').addEventListener('click', function() {
        const btn = this;
        Notification.requestPermission().then(perm => {
            if (perm === "granted") {
                btn.classList.add('btn-active');
                btn.innerText = "Active";
                new Notification("Sentinel Engaged");
            } else {
                alert("Enable Notifications in iOS Settings > Safari");
            }
        });
    });
</script>
</body>
</html>
