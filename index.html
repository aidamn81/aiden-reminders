<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gothic Archive: Widgets & Reminders</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-color: #1a1a1a;
            --accent-color: #4a0404;
            --text-color: #d1d1d1;
            --border-color: #333;
            --highlight: #8b0000;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Georgia', serif;
            margin: 0;
            overflow-x: hidden;
            touch-action: pan-y;
        }

        .admin-bar {
            background: var(--panel-color);
            padding: 20px;
            border-bottom: 2px solid var(--accent-color);
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .admin-bar button {
            background: #222;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button.active {
            background: var(--accent-color);
            border-color: var(--highlight);
            box-shadow: 0 0 15px var(--highlight);
        }

        #widget-display-area {
            padding: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
        }

        .widget-box {
            background: var(--panel-color);
            border: 1px solid var(--accent-color);
            width: 320px;
            min-height: 150px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .widget-title {
            font-size: 1.4rem;
            color: var(--highlight);
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .reminder-item {
            background: #000;
            border-left: 3px solid var(--accent-color);
            margin-bottom: 12px;
            padding: 12px;
        }

        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: var(--panel-color);
            padding: 30px;
            border: 2px solid var(--accent-color);
            width: 90%;
            max-width: 450px;
        }

        input, select { 
            width: 100%; 
            background: #000; 
            border: 1px solid var(--border-color); 
            color: white; 
            margin: 10px 0; 
            padding: 12px; 
            box-sizing: border-box;
        }

        @media (max-width: 768px) {
            .admin-bar button { width: 45%; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="admin-bar">
    <button id="edit-toggle" onclick="toggleEditMode()">Edit Mode</button>
    <button onclick="openModal()">+ Add</button>
    <button onclick="requestNotify()">Enable Notifs</button>
    <button onclick="testNotification()" style="border-color: #555;">Test Notif</button>
</div>

<div id="widget-display-area"></div>

<div id="modal-overlay">
    <div class="modal">
        <h2 style="color:var(--highlight); margin:0; text-align:center;">ARCHIVE ENTRY</h2>
        <input type="text" id="rem-text" placeholder="Task Name">
        <input type="datetime-local" id="rem-time">
        <select id="widget-select" onchange="toggleWidgetInput()">
            <option value="new">-- New Widget --</option>
        </select>
        <input type="text" id="new-widget-name" placeholder="Widget Name...">
        <input type="text" id="rem-link" placeholder="Link (Optional)">
        <input type="file" id="rem-file" accept="image/*">
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button style="flex:1; background:var(--accent-color); color:white; border:none; padding:15px;" onclick="addReminder()">BIND</button>
            <button style="flex:1; background:#222; color:white; border:none; padding:15px;" onclick="closeModal()">CANCEL</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDHrIBHOkeixoLagY9f2JfFqWpQRFj8MeE",
        authDomain: "aiden-reminders.firebaseapp.com",
        databaseURL: "https://aiden-reminders-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "aiden-reminders",
        storageBucket: "aiden-reminders.firebasestorage.app",
        messagingSenderId: "87284883715",
        appId: "1:87284883715:web:c2de76ab3d2f1170084936"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'reminders');

    let reminders = [];
    let alertedIds = new Set();

    // REGISTER SERVICE WORKER (Essential for iOS Notifs)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('data:text/javascript;base64,' + btoa('self.addEventListener("fetch", (event) => {});'))
            .catch(err => console.log("SW registration failed", err));
        });
    }

    window.requestNotify = () => {
        Notification.requestPermission().then(permission => {
            alert("Notification permission: " + permission);
        });
    };

    window.testNotification = () => {
        if (Notification.permission === "granted") {
            new Notification("Archive Test", { body: "If you see this, notifications are working!" });
        } else {
            alert("Please enable notifications first.");
        }
    };

    // CHECKER LOOP
    setInterval(() => {
        const now = new Date();
        const currentTimeStr = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 16);

        reminders.forEach(rem => {
            if (rem.time === currentTimeStr && !alertedIds.has(rem.id)) {
                if (Notification.permission === "granted") {
                    new Notification("Gothic Reminder", { body: rem.text });
                }
                alert("RITUAL DUE: " + rem.text);
                alertedIds.add(rem.id);
            }
        });
    }, 10000); // Check every 10 seconds

    window.toggleEditMode = () => {
        document.body.classList.toggle('edit-mode');
        document.getElementById('edit-toggle').classList.toggle('active');
    };

    window.toggleWidgetInput = () => {
        document.getElementById('new-widget-name').style.display = (document.getElementById('widget-select').value === 'new') ? 'block' : 'none';
    };

    window.openModal = () => {
        const select = document.getElementById('widget-select');
        select.innerHTML = '<option value="new">-- New Widget --</option>';
        const unique = [...new Set(reminders.map(r => r.widget))].filter(Boolean);
        unique.forEach(n => select.innerHTML += `<option value="${n}">${n}</option>`);
        document.getElementById('modal-overlay').style.display = 'flex';
    };

    window.closeModal = () => document.getElementById('modal-overlay').style.display = 'none';

    onValue(dbRef, (snapshot) => {
        const data = snapshot.val();
        reminders = data ? Object.keys(data).map(key => ({ ...data[key], id: key })) : [];
        renderArchive();
    });

    window.addReminder = () => {
        const text = document.getElementById('rem-text').value;
        const time = document.getElementById('rem-time').value;
        const link = document.getElementById('rem-link').value;
        const widget = (document.getElementById('widget-select').value === 'new') ? document.getElementById('new-widget-name').value : document.getElementById('widget-select').value;
        const file = document.getElementById('rem-file').files[0];

        const finalize = (img = null) => {
            push(dbRef, { text, time, link, widget, image: img });
            closeModal();
        };

        if (file) {
            const r = new FileReader();
            r.onload = (e) => finalize(e.target.result);
            r.readAsDataURL(file);
        } else finalize();
    };

    window.deleteReminder = (id) => {
        if(confirm("Delete?")) remove(ref(db, `reminders/${id}`));
    };

    function renderArchive() {
        const container = document.getElementById('widget-display-area');
        container.innerHTML = '';
        const groups = reminders.reduce((acc, curr) => {
            if (!acc[curr.widget]) acc[curr.widget] = [];
            acc[curr.widget].push(curr);
            return acc;
        }, {});

        Object.keys(groups).forEach(name => {
            const box = document.createElement('div');
            box.className = 'widget-box';
            box.innerHTML = `<div class="widget-title">${name}</div>`;
            groups[name].forEach(item => {
                box.innerHTML += `
                    <div class="reminder-item">
                        <input type="checkbox" onchange="deleteReminder('${item.id}')">
                        <b>${item.text}</b><br>
                        <small>${item.time ? item.time : 'No time'}</small>
                        ${item.image ? `<img src="${item.image}" style="width:100%; margin-top:5px;">` : ''}
                    </div>`;
            });
            container.appendChild(box);
        });
    }
</script>
</body>
</html>
