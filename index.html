<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Gothic Archive: Sentinel</title>
    <style>
        :root {
            --bg-color: #000000;
            --panel-color: #0a0a0a;
            --accent-color: #4a0404;
            --highlight: #8b0000;
            --text-color: #e0e0e0;
            --on-glow: #00ff41;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Georgia', serif;
            margin: 0;
            padding-bottom: 100px;
            overflow-x: hidden;
        }

        .admin-bar {
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(25px);
            padding: 15px;
            border-bottom: 1px solid var(--accent-color);
            display: flex;
            gap: 10px;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .admin-bar button {
            background: #111;
            color: var(--text-color);
            border: 1px solid #333;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        .notif-toggle.active { border-color: var(--on-glow); box-shadow: 0 0 10px var(--on-glow); color: var(--on-glow); }
        #edit-btn.active { background: var(--accent-color); border-color: var(--highlight); }

        #widget-display-area {
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 15px;
        }

        .widget-box {
            background: var(--panel-color);
            border: 1px solid #1a1a1a;
            padding: 15px;
            border-radius: 25px;
        }

        .widget-title {
            font-size: 0.75rem;
            color: #cc6666;
            text-align: center;
            margin-bottom: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .reminder-item {
            background: #000;
            border-radius: 18px;
            padding: 12px;
            border: 1px solid #181818;
            margin-bottom: 10px;
        }

        .edit-active .reminder-item { border: 1px dashed var(--highlight); }

        .reminder-header { display: flex; flex-direction: column; gap: 4px; }
        .time-tag { font-size: 0.6rem; color: #555; }
        span { font-size: 0.9rem; line-height: 1.4; word-wrap: break-word; }

        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); display: none;
            justify-content: center; align-items: center; z-index: 2000;
        }

        .modal { background: #050505; padding: 25px; border: 1px solid var(--accent-color); border-radius: 30px; width: 90%; max-width: 380px; }
        input, select { width: 100%; background: #000; border: 1px solid #222; color: white; margin: 8px 0; padding: 14px; border-radius: 15px; font-size: 1rem; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="admin-bar">
    <button id="edit-btn">Edit</button>
    <button id="add-btn">+ Add</button>
    <button id="notif-toggle">Notifs</button>
    <button id="sync-btn">Sync</button>
</div>

<div id="widget-display-area"></div>

<div id="modal-overlay">
    <div class="modal">
        <h3 style="color:var(--highlight); text-align:center;">ARCHIVE DATA</h3>
        <input type="hidden" id="edit-id">
        <input type="text" id="rem-text" placeholder="Ritual Name">
        <input type="datetime-local" id="rem-time">
        <select id="widget-select">
            <option value="new">-- New Widget --</option>
        </select>
        <input type="text" id="new-widget-name" placeholder="Widget Name..." style="display:none;">
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button id="save-btn" style="flex:1; background:var(--accent-color); color:white; border:none; padding:15px; border-radius:20px;">BIND</button>
            <button id="close-modal-btn" style="flex:1; background:#222; color:white; border:none; padding:15px; border-radius:20px;">EXIT</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDHrIBHOkeixoLagY9f2JfFqWpQRFj8MeE",
        authDomain: "aiden-reminders.firebaseapp.com",
        databaseURL: "https://aiden-reminders-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "aiden-reminders",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'reminders');

    let reminders = [];
    let isEditMode = false;

    // --- BUTTON BINDING (Fixes the "None work" issue) ---
    document.getElementById('edit-btn').onclick = () => toggleEditMode();
    document.getElementById('add-btn').onclick = () => openModal();
    document.getElementById('notif-toggle').onclick = () => requestSentinel();
    document.getElementById('sync-btn').onclick = () => location.reload();
    document.getElementById('close-modal-btn').onclick = () => closeModal();
    document.getElementById('save-btn').onclick = () => saveReminder();
    document.getElementById('widget-select').onchange = (e) => {
        document.getElementById('new-widget-name').style.display = (e.target.value === 'new') ? 'block' : 'none';
    };

    // --- SERVICE WORKER ---
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').then(() => console.log('Sentinel Online'));
    }

    function requestSentinel() {
        Notification.requestPermission().then(perm => {
            const btn = document.getElementById('notif-toggle');
            btn.classList.toggle('active', perm === "granted");
            btn.innerText = perm === "granted" ? "Notifs: On" : "Notifs: Off";
            if(perm === "granted") new Notification("Sentinel Active");
        });
    }

    function toggleEditMode() {
        isEditMode = !isEditMode;
        document.body.classList.toggle('edit-active', isEditMode);
        document.getElementById('edit-btn').classList.toggle('active', isEditMode);
        renderArchive();
    }

    function openModal(id = null) {
        const select = document.getElementById('widget-select');
        select.innerHTML = '<option value="new">-- New Widget --</option>';
        [...new Set(reminders.map(r => r.widget))].filter(Boolean).forEach(w => {
            select.innerHTML += `<option value="${w}">${w}</option>`;
        });

        if (id) {
            const r = reminders.find(item => item.id === id);
            document.getElementById('edit-id').value = id;
            document.getElementById('rem-text').value = r.text;
            document.getElementById('rem-time').value = r.time || '';
            document.getElementById('widget-select').value = r.widget;
        } else {
            document.getElementById('edit-id').value = '';
            document.getElementById('rem-text').value = '';
            document.getElementById('rem-time').value = '';
        }
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    function saveReminder() {
        const id = document.getElementById('edit-id').value;
        const text = document.getElementById('rem-text').value;
        const time = document.getElementById('rem-time').value;
        const wSel = document.getElementById('widget-select').value;
        const wName = (wSel === 'new') ? document.getElementById('new-widget-name').value : wSel;
        
        if (!text || !wName) return alert("Archive requires more data.");
        
        const payload = { text, time, widget: wName };
        if (id) update(ref(db, `reminders/${id}`), payload);
        else push(dbRef, payload);
        closeModal();
    }

    onValue(dbRef, (snap) => {
        const data = snap.val();
        reminders = data ? Object.keys(data).map(k => ({ ...data[k], id: k })) : [];
        renderArchive();
        
        if (navigator.serviceWorker.controller) {
            navigator.serviceWorker.controller.postMessage({ type: 'SYNC', data: reminders });
        }
    });

    function renderArchive() {
        const area = document.getElementById('widget-display-area');
        area.innerHTML = '';
        const groups = reminders.reduce((acc, r) => {
            if (!acc[r.widget]) acc[r.widget] = [];
            acc[r.widget].push(r);
            return acc;
        }, {});

        Object.keys(groups).forEach(name => {
            const box = document.createElement('div');
            box.className = 'widget-box';
            box.innerHTML = `<div class="widget-title">${name}</div><div class="reminder-list"></div>`;
            
            groups[name].forEach(item => {
                const div = document.createElement('div');
                div.className = 'reminder-item';
                div.onclick = () => { if (isEditMode) openModal(item.id); };
                
                div.innerHTML = `
                    <div class="reminder-header">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                             <input type="checkbox" id="check-${item.id}">
                             <div class="time-tag">${item.time ? item.time.split('T')[1] : ''}</div>
                        </div>
                        <span>${item.text}</span>
                    </div>
                `;
                // Checkbox separate click to prevent opening modal
                div.querySelector('input').onclick = (e) => {
                    e.stopPropagation();
                    if(confirm("Erase?")) remove(ref(db, `reminders/${item.id}`));
                };
                box.querySelector('.reminder-list').appendChild(div);
            });
            area.appendChild(box);
        });
    }
</script>
</body>
</html>
